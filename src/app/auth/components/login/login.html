<div class="login" [ngClass]="{'removeBlink': removeBlink}">
    <div class="heading"> 
        <img src="assets/note-icon.png" alt="nto" width="150">
        <h2>Welcome Back!</h2>
        <p>Login to continue to your notes</p>
    </div>
    <div class="form">
        <div class="inputs">
            <label>Email</label>
            <div class="email">
                <input type="email" name="email" placeholder="Enter your email" #email="ngModel" [(ngModel)]="loginData.email" required>
                <div class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="#8F93A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 6L12 13L2 6" stroke="#8F93A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                @if (email.invalid && email.touched){
                    <div class="error-icon" [ngClass]="{'animate-error-icon': email.invalid && email.touched}">
                        <img src="assets/error.svg" width="20">
                    </div>
                }
            </div>
            @if (email.invalid && email.touched){
                <div class="error-message">
                    <p>Please Enter your email!!</p>
                </div>
            }
            @if(invalidLogin){
                <div class="error-message">
                    Invalid Email or Password
                </div>
            }
        </div>
        <div class="inputs">
            <label>Password</label>
            <div class="password">
                <input [type]="eye? 'text': 'password'" name="password" [(ngModel)]="loginData.password" #password="ngModel" placeholder="Enter your password" required>
                <div class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 11H5C3.89543 11 3 11.8954 3 13V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V13C21 11.8954 20.1046 11 19 11Z" stroke="#8F93A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="#8F93A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="eye" (click)="viewPassword()">
                    @if(!eye){
                        <img src="assets/eye-off.svg">
                    }@else {
                        <img src="assets/eye.svg">
                    }
                </div>
            </div>
        </div>
        <div class="recovery">
            <div class="remember-me">
                <input type="checkbox">
                <p>Remember me</p>
            </div>
            <div class="forgot-password">
                <p>Forgot password?</p>
            </div>
        </div>
        <div class="btn" >
            <button class="submit" type="submit" [disabled]="email.invalid || password.invalid" [ngClass]="{'disabled' : email.invalid}" (click)="submit()">Login</button>
        </div>
    </div>
    <div class="loading" *ngIf="load"><img src="assets/loader.svg" width="50">loading</div>
    <div class="goSignup">
        <p>Don't have an account? <a (click)="navigate()">Sign up</a></p>
    </div>
</div>
