<div class="note">
    <div class="left-section">
        <div class="icon" [ngClass]="note.icon + '-icon' "><img src="/assets/{{note.icon}}.svg"></div>
    </div>
    <div class="right-section">
        <div class="right-left">
            <div>
                <app-note-heading [heading]="note.title"></app-note-heading>
                <app-note-content [data]="note.content"></app-note-content>
            </div>
            <div class="bottom-section">
                <div class="category" [ngClass]="note.icon + '-text-bg'">
                    <p [ngClass]="note.icon + '-text' " >{{note.category}}</p>
                </div>
            </div>
        </div>
        <div class="right-right">
            @if(note.pinned){
                <img src="/assets/pinned.svg" (click)="pin()">
            }@else {
                <img src="/assets/star.svg" (click)="pin()" >
            }
            <p>{{note.updatedAt}}</p>
        </div>
    </div>
</div>
