<div class="edit-profile">
    <app-otherheading [headingInfo]="headingInfo"></app-otherheading>
    <div class="heading">
        <div class="icon">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 52.5C12.5 42.835 20.335 35 30 35C39.665 35 47.5 42.835 47.5 52.5M40 17.5C40 23.0229 35.5228 27.5 30 27.5C24.4771 27.5 20 23.0229 20 17.5C20 11.9771 24.4771 7.5 30 7.5C35.5228 7.5 40 11.9771 40 17.5Z" stroke="#6F3FBF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="heading-info">
            <h2>Account</h2>
            <div class="info-p"><p>Manage your account information and security</p> </div>
        </div>
    </div>
    <div class="operations">
        <div class="tab email">
            <div class="tab-icon"> 
                <img src="assets/mail.svg">
            </div>
            <div class="tab-detail">
                <h4>Email Address</h4>
                <p>tonderai@gmail.com</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
        <div class="tab">
            <div class="tab-icon"> 
                <img src="assets/lock.svg">
            </div>
            <div class="tab-detail">
                <h4>Change Password</h4>
                <p>Update your password</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
        <div class="tab">
            <div class="tab-icon trash"> 
                <img src="assets/trash.svg">
            </div>
            <div class="tab-detail">
                <h4>Delete Account</h4>
                <p>Permanently delete you account and all data</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
        
    </div>
</div>
