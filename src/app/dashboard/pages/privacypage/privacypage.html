<div class="privacy">
    <app-otherheading [headingInfo]="headingInfo"></app-otherheading>
    <div class="heading">
        <div class="icon">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 55C30 55 50 45 50 30V12.5L30 5L10 12.5V30C10 45 30 55 30 55Z" stroke="#6F3FBF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="heading-info">
            <h2>Privacy</h2>
            <div class="info-p"><p>Manage your privacy settings and data.</p> </div>
        </div>
    </div>
    <div class="operations">
        <div class="tab email">
            <div class="tab-icon"> 
                <img src="assets/data.svg">
            </div>
            <div class="tab-detail">
                <h4>Data Privacy</h4>
                <p>Learn how we collect, use, and protect you data</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
        <div class="tab email">
            <div class="tab-icon"> 
                <img src="assets/upload.svg" width="25">
            </div>
            <div class="tab-detail">
                <h4>Export Data</h4>
                <p>Dawnload a copy of you data</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
        <div class="tab delete">
            <div class="tab-icon"> 
                <img src="assets/trash.svg">
            </div>
            <div class="tab-detail">
                <h4>Delete Data</h4>
                <p>Permanently delete your data</p>
            </div>
            <div class="see-more">
                <img src="assets/right.svg">
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="footer-icon">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 55C30 55 50 45 50 30V12.5L30 5L10 12.5V30C10 45 30 55 30 55Z" stroke="#6F3FBF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="footer-heading-info">
            <h4>We take your privacy seriously.</h4>
            <div class="info-p"><p>Your data is encrypted and never shared with third parties.</p> </div>
        </div>
    </div>
</div>
